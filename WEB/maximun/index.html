<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Algoritmo: Máximo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-element {
            border: 4px solid #ef4444 !important; /* Borde rojo para el índice */
            transform: scale(1.1);
            z-index: 10;
        }
        .max-found {
            background-color: #10b981 !important; /* Fondo verde para el máximo */
            border-color: #059669 !important;
            color: white;
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl p-4"><a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded mb-4 transition duration-300 neon-border">Volver</a></div>

    <main class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-xl border border-slate-800 p-8">
        <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Encontrar el Valor Máximo</h1>
        
        <!-- Contenedor del Vector -->
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="array-container">
            <!-- Los elementos se generan dinámicamente -->
        </div>

        <!-- Panel de Estado -->
        <div class="flex flex-wrap md:flex-nowrap items-center justify-between gap-4 text-center bg-slate-950 p-6 rounded-xl mb-8">
            <div class="flex-1 min-w-[100px] flex flex-col">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Índice (i)</span>
                <span id="display-i" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex-1 min-w-[100px] flex flex-col">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Valor x(i)</span>
                <span id="display-val" class="text-3xl font-mono font-semibold text-red-500">-</span>
            </div>
            <div class="flex-1 min-w-[100px] flex flex-col md:border-l border-slate-800">
                <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Máximo Anterior</span>
                <span id="display-prev-max" class="text-3xl font-mono font-semibold text-slate-500">-</span>
            </div>
            <div class="flex-1 min-w-[100px] flex flex-col md:border-l border-slate-800">
                <span class="text-xs text-indigo-400 uppercase font-bold tracking-wider">Máximo Actual</span>
                <span id="display-max" class="text-4xl font-mono font-bold text-emerald-400">-</span>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col items-center gap-6">
            <p id="step-desc" class="text-center italic text-slate-400 min-h-[3rem] px-4">
                Presiona "Siguiente Paso" para iniciar con un vector aleatorio.
            </p>
            
            <div class="flex gap-4">
                <button onclick="resetSimulation()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors">
                    Reiniciar (Aleatorio)
                </button>
                <button id="next-btn" onclick="nextStep()" class="px-8 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg active:scale-95">
                    Siguiente Paso
                </button>
            </div>
        </div>
    </main>

    <script>
        let numbers = [];
        let currentIdx = -1;
        let currentMax = -Infinity;
        let previousMax = -Infinity;
        let isFinished = false;

        const arrayContainer = document.getElementById('array-container');
        const displayI = document.getElementById('display-i');
        const displayVal = document.getElementById('display-val');
        const displayPrevMax = document.getElementById('display-prev-max');
        const displayMax = document.getElementById('display-max');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        function generateRandomArray() {
            const size = Math.floor(Math.random() * 4) + 5;
            numbers = Array.from({ length: size }, () => Math.floor(Math.random() * 99) + 1);
        }

        function initArrayUI() {
            arrayContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const div = document.createElement('div');
                div.id = `box-${index}`;
                div.className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-slate-800 border-2 border-slate-700 text-slate-100 rounded-lg text-xl font-bold shadow-sm transition-all';
                div.innerText = num;
                arrayContainer.appendChild(div);
            });
        }

        function resetSimulation() {
            generateRandomArray();
            currentIdx = -1;
            currentMax = -Infinity;
            previousMax = -Infinity;
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.innerText = "Siguiente Paso";
            displayI.innerText = "-";
            displayVal.innerText = "-";
            displayPrevMax.innerText = "-";
            displayMax.innerText = "-";
            stepDesc.innerText = "Vector generado. Comencemos la comparación.";
            initArrayUI();
        }

        function nextStep() {
            if (isFinished) return;

            if (currentIdx === -1) {
                currentIdx = 0;
                previousMax = -Infinity;
                currentMax = numbers[0];
                updateUI(0, `Inicio: El primer valor (${currentMax}) se establece como máximo.`);
                renderStates(0);
                return;
            }

            currentIdx++;

            if (currentIdx < numbers.length) {
                const val = numbers[currentIdx];
                previousMax = currentMax;
                
                if (val > currentMax) {
                    currentMax = val;
                    updateUI(currentIdx, `¡Nuevo máximo! ${val} es mayor que ${previousMax}.`);
                } else {
                    updateUI(currentIdx, `${val} no supera a ${currentMax}. El máximo se mantiene.`);
                }
                renderStates(currentIdx);
            } else {
                isFinished = true;
                nextBtn.disabled = true;
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                nextBtn.innerText = "Finalizado";
                stepDesc.innerHTML = `<span class="text-indigo-400 font-bold text-lg">Fin del recorrido. El valor máximo es ${currentMax}.</span>`;
                document.querySelectorAll('.active-element').forEach(el => el.classList.remove('active-element'));
            }
        }

        function renderStates(activeIndex) {
            for (let i = 0; i < numbers.length; i++) {
                const box = document.getElementById(`box-${i}`);
                if (i === activeIndex) {
                    box.classList.add('active-element');
                } else {
                    box.classList.remove('active-element');
                }
                
                if (i <= activeIndex && numbers[i] === currentMax) {
                    box.classList.add('max-found');
                } else {
                    box.classList.remove('max-found');
                }
            }
        }

        function updateUI(idx, message) {
            displayI.innerText = idx + 1;
            displayVal.innerText = numbers[idx];
            displayPrevMax.innerText = previousMax === -Infinity ? "N/A" : previousMax;
            displayMax.innerText = currentMax;
            stepDesc.innerText = message;
        }

        resetSimulation();
    </script>
</body>
</html>
