<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Cálculo de la Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-element {
            border: 4px solid #ef4444 !important; /* Rojo para el índice i */
            transform: scale(1.1);
            z-index: 10;
        }
        .processed {
            background-color: #dcfce7 !important; /* Verde suave para elementos sumados */
            border-color: #22c55e !important;
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl p-4"><a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded mb-4 transition duration-300 neon-border">Volver</a></div>

    <main class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-xl border border-slate-800 p-8">
        <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Cálculo de la Media</h1>
        
        <!-- Contenedor del Vector -->
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="array-container">
            <!-- Elementos generados dinámicamente -->
        </div>

        <!-- Panel de Estado -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center bg-slate-950 p-6 rounded-xl mb-8">
            <div class="flex flex-col">
                <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Índice (i)</span>
                <span id="display-i" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0">
                <span class="text-xs text-indigo-400 uppercase font-bold tracking-wider">Suma Acumulada (sum)</span>
                <span id="display-sum" class="text-4xl font-mono font-bold text-indigo-600">0</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0">
                <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Media Final</span>
                <span id="display-mean" class="text-4xl font-mono font-bold text-emerald-600">-</span>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col items-center gap-6">
            <p id="step-desc" class="text-center italic text-slate-400 min-h-[3rem] px-4 max-w-2xl">
                Presiona "Siguiente Paso" para comenzar a sumar los valores.
            </p>
            
            <div class="flex gap-4">
                <button onclick="resetSimulation()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors">
                    Reiniciar (Aleatorio)
                </button>
                <button id="next-btn" onclick="nextStep()" class="px-8 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg active:scale-95">
                    Siguiente Paso
                </button>
            </div>
        </div>
    </main>

    <script>
        let numbers = [];
        let currentIdx = 0;
        let currentSum = 0;
        let isFinished = false;

        const arrayContainer = document.getElementById('array-container');
        const displayI = document.getElementById('display-i');
        const displaySum = document.getElementById('display-sum');
        const displayMean = document.getElementById('display-mean');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        function generateRandomArray() {
            const size = Math.floor(Math.random() * 3) + 5; // Entre 5 y 7 elementos
            numbers = Array.from({ length: size }, () => Math.floor(Math.random() * 20) + 1);
        }

        function initArrayUI() {
            arrayContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const div = document.createElement('div');
                div.id = `box-${index}`;
                div.className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-slate-800 border-2 border-slate-700 text-slate-100 rounded-lg text-xl font-bold shadow-sm transition-all duration-300';
                div.innerText = num;
                arrayContainer.appendChild(div);
            });
        }

        function resetSimulation() {
            generateRandomArray();
            currentIdx = 0;
            currentSum = 0;
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.innerText = "Siguiente Paso";
            displayI.innerText = "-";
            displaySum.innerText = "0";
            displayMean.innerText = "-";
            stepDesc.innerText = "Vector generado. Haz clic para empezar el bucle de suma.";
            initArrayUI();
        }

        function nextStep() {
            if (isFinished) return;

            const n = numbers.length;

            if (currentIdx < n) {
                const val = numbers[currentIdx];
                const prevSum = currentSum;
                currentSum += val;
                
                stepDesc.innerText = `Sumando x(${currentIdx + 1}): ${prevSum} + ${val} = ${currentSum}`;
                render(currentIdx);
                
                currentIdx++;
            } else {
                const mean = (currentSum / n).toFixed(2);
                displayMean.innerText = mean;
                stepDesc.innerHTML = `<span class="text-indigo-600 font-bold text-lg">Bucle terminado. Media = ${currentSum} / ${n} = ${mean}</span>`;
                isFinished = true;
                nextBtn.innerText = "Finalizado";
                nextBtn.disabled = true;
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                // Limpiar bordes rojos al terminar
                document.querySelectorAll('.active-element').forEach(el => el.classList.remove('active-element'));
            }
        }

        function render(activeIndex) {
            for (let k = 0; k < numbers.length; k++) {
                const box = document.getElementById(`box-${k}`);
                if (k === activeIndex) {
                    box.classList.add('active-element');
                    box.classList.add('processed');
                } else if (k < activeIndex) {
                    box.classList.remove('active-element');
                    box.classList.add('processed');
                } else {
                    box.classList.remove('active-element', 'processed');
                }
            }
            displayI.innerText = activeIndex + 1;
            displaySum.innerText = currentSum;
        }

        resetSimulation();
    </script>
</body>
</html>
