<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Cálculo de la Mediana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-element {
            border: 4px solid #ef4444 !important;
            transform: scale(1.1);
            z-index: 10;
        }
        .median-highlight {
            background-color: #fef08a !important;
            border-color: #eab308 !important;
            color: #854d0e;
        }
        .result-highlight {
            background-color: #10b981 !important;
            border-color: #059669 !important;
            color: white;
        }
        .sorting-highlight {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
        .transition-all {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl p-4"><a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded mb-4 transition duration-300 neon-border">Volver</a></div>

    <main class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-xl border border-slate-800 p-8">
        <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Cálculo de la Mediana</h1>
        
        <!-- Contenedor del Vector -->
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="array-container"></div>

        <!-- Panel de Estado -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center bg-slate-950 p-6 rounded-xl mb-8">
            <div class="flex flex-col">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Longitud (n)</span>
                <span id="display-n" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0">
                <span class="text-xs text-indigo-400 uppercase font-bold tracking-wider">Tipo (Par/Impar)</span>
                <span id="display-type" class="text-3xl font-mono font-bold text-indigo-400">-</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0">
                <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Mediana Final</span>
                <span id="display-median" class="text-4xl font-mono font-bold text-emerald-400">-</span>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col items-center gap-6">
            <p id="step-desc" class="text-center italic text-slate-400 min-h-[3rem] px-4 max-w-2xl">
                Presiona "Siguiente Paso" para comenzar con el vector desordenado.
            </p>
            
            <div class="flex gap-4">
                <button onclick="resetSimulation()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors">
                    Nuevo Vector (Aleatorio)
                </button>
                <button id="next-btn" onclick="nextStep()" class="px-8 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg active:scale-95">
                    Siguiente Paso
                </button>
            </div>
        </div>
    </main>

    <script>
        let numbers = [];
        let step = -1; // -1: Desordenado, 0: Ordenar, 1: Tipo, 2: Resaltar, 3: Finalizar
        let isFinished = false;

        const arrayContainer = document.getElementById('array-container');
        const displayN = document.getElementById('display-n');
        const displayType = document.getElementById('display-type');
        const displayMedian = document.getElementById('display-median');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        function generateRandomArray() {
            const size = Math.floor(Math.random() * 5) + 4;
            numbers = Array.from({ length: size }, () => Math.floor(Math.random() * 99) + 1);
        }

        function initArrayUI() {
            arrayContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const div = document.createElement('div');
                div.id = `box-${index}`;
                div.className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-slate-800 border-2 border-slate-700 text-slate-100 rounded-lg text-xl font-bold shadow-sm transition-all duration-500';
                div.innerText = num;
                arrayContainer.appendChild(div);
            });
        }

        function resetSimulation() {
            generateRandomArray();
            step = 0;
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.innerText = "Siguiente Paso";
            displayN.innerText = numbers.length;
            displayType.innerText = "-";
            displayMedian.innerText = "-";
            stepDesc.innerText = "Vector generado aleatoriamente. El primer paso es ordenarlo.";
            initArrayUI();
        }

        function nextStep() {
            if (isFinished) return;

            const n = numbers.length;
            const isEven = (n % 2 === 0);

            if (step === 0) {
                // Paso: Ordenar (sort_asc)
                numbers.sort((a, b) => a - b);
                numbers.forEach((num, index) => {
                    const box = document.getElementById(`box-${index}`);
                    box.innerText = num;
                    box.classList.add('sorting-highlight');
                });
                stepDesc.innerText = "Paso 1: x = sort_asc(x). El vector ha sido ordenado ascendentemente.";
                step = 1;
            } else if (step === 1) {
                // Paso: Identificar tipo (par/impar)
                document.querySelectorAll('.sorting-highlight').forEach(el => el.classList.remove('sorting-highlight'));
                displayType.innerText = isEven ? "PAR" : "IMPAR";
                if (isEven) {
                    stepDesc.innerText = `n=${n} es par. Usaremos la fórmula: mediana = (x(n/2) + x(n/2 + 1)) / 2.`;
                } else {
                    stepDesc.innerText = `n=${n} es impar. Usaremos la fórmula: mediana = x((n+1)/2).`;
                }
                step = 2;
            } else if (step === 2) {
                // Paso: Resaltar elementos centrales
                let result;
                if (isEven) {
                    const mid1 = (n / 2) - 1;
                    const mid2 = (n / 2);
                    document.getElementById(`box-${mid1}`).classList.add('median-highlight', 'active-element');
                    document.getElementById(`box-${mid2}`).classList.add('median-highlight', 'active-element');
                    result = (numbers[mid1] + numbers[mid2]) / 2;
                    stepDesc.innerText = `Posiciones centrales encontradas: ${numbers[mid1]} y ${numbers[mid2]}.`;
                } else {
                    const mid = Math.floor(n / 2);
                    document.getElementById(`box-${mid}`).classList.add('median-highlight', 'active-element');
                    result = numbers[mid];
                    stepDesc.innerText = `Posición central encontrada: ${result}.`;
                }
                displayMedian.innerText = result % 1 === 0 ? result : result.toFixed(1);
                step = 3;
            } else {
                // Finalizar
                const resultVal = displayMedian.innerText;
                stepDesc.innerHTML = `<span class="text-indigo-600 font-bold text-lg">Proceso completado. Mediana = ${resultVal}.</span>`;
                
                document.querySelectorAll('.median-highlight').forEach(el => {
                    el.classList.remove('median-highlight', 'active-element');
                    el.classList.add('result-highlight');
                });

                isFinished = true;
                nextBtn.innerText = "Finalizado";
                nextBtn.disabled = true;
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        resetSimulation();
    </script>
</body>
</html>
