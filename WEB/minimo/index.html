<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Valor Mínimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    @font-face {
      font-family: 'Monocraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Monocraft@main/dist/Monocraft-ttf/Monocraft.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    body {
      font-family: 'Monocraft', monospace;
    }
        .active-element {
            border: 4px solid #ef4444 !important; /* Rojo para el índice i */
            transform: scale(1.1);
            z-index: 10;
        }
        .min-highlight {
            background-color: #064e3b !important; /* Verde oscuro para el mínimo actual */
            border-color: #166534 !important;
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-border {
            box-shadow: 0 0 5px #fff, 0 0 10px #a855f7, inset 0 0 5px #a855f7;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl p-4"><a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded mb-4 transition duration-300 neon-border">Volver</a></div>

    <main class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-xl border border-slate-800 p-8">
        <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Búsqueda del Mínimo</h1>
        
        <!-- Contenedor del Vector -->
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="array-container">
            <!-- Elementos generados dinámicamente -->
        </div>

        <!-- Panel de Estado -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-center bg-slate-950 p-6 rounded-xl mb-8 border border-slate-800">
            <div class="flex flex-col">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Índice (i)</span>
                <span id="display-i" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0">
                <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Mínimo Actual (min)</span>
                <span id="display-min" class="text-4xl font-mono font-bold text-emerald-400">-</span>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col items-center gap-6">
            <p id="step-desc" class="text-center italic text-slate-400 min-h-[3rem] px-4 max-w-2xl">
                Presiona "Siguiente Paso" para comenzar la búsqueda.
            </p>
            
            <div class="flex gap-4">
                <button onclick="resetSimulation()" class="border-2 border-slate-600 hover:bg-slate-600/20 text-slate-300 font-medium py-2 px-6 rounded transition duration-300">
                    Reiniciar (Aleatorio)
                </button>
                <button id="next-btn" onclick="nextStep()" class="border-2 border-purple-500 hover:bg-purple-500/20 text-purple-400 font-bold py-2 px-8 rounded transition duration-300 neon-border active:scale-95">
                    Siguiente Paso
                </button>
            </div>
        </div>
    </main>

    <script>
        let numbers = [];
        let currentIdx = 0;
        let currentMin = Infinity;
        let isFinished = false;

        const arrayContainer = document.getElementById('array-container');
        const displayI = document.getElementById('display-i');
        const displayMin = document.getElementById('display-min');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        function generateRandomArray() {
            const size = Math.floor(Math.random() * 3) + 5; // Entre 5 y 7 elementos
            numbers = Array.from({ length: size }, () => Math.floor(Math.random() * 50) + 1);
        }

        function initArrayUI() {
            arrayContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const div = document.createElement('div');
                div.id = `box-${index}`;
                div.className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-slate-800 border-2 border-slate-700 text-slate-100 rounded-lg text-xl font-bold shadow-sm transition-all duration-300';
                div.innerText = num;
                arrayContainer.appendChild(div);
            });
        }

        function resetSimulation() {
            generateRandomArray();
            currentIdx = 0;
            currentMin = Infinity;
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.innerText = "Siguiente Paso";
            displayI.innerText = "-";
            displayMin.innerText = "-";
            stepDesc.innerText = "Vector generado. El primer paso es inicializar min = x(1).";
            initArrayUI();
        }

        function nextStep() {
            if (isFinished) return;

            const n = numbers.length;

            if (currentIdx === 0) {
                currentMin = numbers[0];
                displayMin.innerText = currentMin;
                displayI.innerText = 1;
                stepDesc.innerText = `Inicializamos min = x(1) = ${currentMin}.`;
                render(0);
                currentIdx = 1;
            } else if (currentIdx < n) {
                const val = numbers[currentIdx];
                const prevMin = currentMin;
                
                if (val < currentMin) {
                    currentMin = val;
                    stepDesc.innerText = `x(${currentIdx + 1}) = ${val} es menor que ${prevMin}. Nuevo min = ${currentMin}.`;
                } else {
                    stepDesc.innerText = `x(${currentIdx + 1}) = ${val} no es menor que ${currentMin}. min se mantiene.`;
                }
                
                displayMin.innerText = currentMin;
                displayI.innerText = currentIdx + 1;
                render(currentIdx);
                currentIdx++;
            } else {
                stepDesc.innerHTML = `<span class="text-purple-400 font-bold text-lg">Búsqueda terminada. El valor mínimo es ${currentMin}.</span>`;
                isFinished = true;
                nextBtn.innerText = "Finalizado";
                nextBtn.disabled = true;
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                document.querySelectorAll('.active-element').forEach(el => el.classList.remove('active-element'));
            }
        }

        function render(activeIndex) {
            for (let k = 0; k < numbers.length; k++) {
                const box = document.getElementById(`box-${k}`);
                box.classList.remove('active-element', 'min-highlight');
                if (k === activeIndex) {
                    box.classList.add('active-element');
                }
                if (numbers[k] === currentMin && currentMin !== Infinity) {
                    box.classList.add('min-highlight');
                }
            }
        }

        resetSimulation();
    </script>
</body>
</html>
