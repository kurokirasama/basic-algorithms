<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Cálculo de la Moda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .puntero-i {
            border: 4px solid #3b82f6 !important; /* Azul para el elemento base i */
            transform: scale(1.05);
        }
        .puntero-j {
            border: 4px solid #ef4444 !important; /* Rojo para la comparación j */
            transform: scale(1.1);
            z-index: 10;
        }
        .match-found {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
        }
        .mode-current {
            background-color: #10b981 !important;
            color: white;
            border-color: #059669 !important;
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-4xl bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
        <h1 class="text-2xl font-bold text-center mb-8 text-indigo-700">Simulación: Cálculo de la Moda</h1>
        
        <!-- Contenedor del Vector -->
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="array-container"></div>

        <!-- Panel de Estado -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center bg-slate-100 p-6 rounded-xl mb-8">
            <div class="flex flex-col">
                <span class="text-xs text-blue-600 uppercase font-bold tracking-wider">Base x(i)</span>
                <span id="display-i-val" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col">
                <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Contador</span>
                <span id="display-count" class="text-3xl font-mono font-semibold text-slate-600">0</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Máx. Repeticiones</span>
                <span id="display-max-count" class="text-3xl font-mono font-semibold text-slate-400">0</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0">
                <span class="text-xs text-emerald-600 uppercase font-bold tracking-wider">Moda Actual</span>
                <span id="display-mode" class="text-4xl font-mono font-bold text-emerald-600">-</span>
            </div>
        </div>

        <!-- Controles -->
        <div class="flex flex-col items-center gap-6">
            <p id="step-desc" class="text-center italic text-slate-600 min-h-[3rem] px-4 max-w-2xl">
                Presiona "Siguiente Paso" para buscar el valor que más se repite.
            </p>
            
            <div class="flex gap-4">
                <button onclick="resetSimulation()" class="px-6 py-2 bg-slate-200 hover:bg-slate-300 rounded-lg font-medium transition-colors">
                    Nuevo Vector (Aleatorio)
                </button>
                <button id="next-btn" onclick="nextStep()" class="px-8 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg active:scale-95">
                    Siguiente Paso
                </button>
            </div>
        </div>
    </main>

    <script>
        let numbers = [];
        let i = 0;
        let j = 0;
        let count = 0;
        let maxCount = 0;
        let moda = 0;
        let state = 'INIT_I'; // INIT_I, LOOP_J, CHECK_MAX, FINISHED
        let isFinished = false;

        const arrayContainer = document.getElementById('array-container');
        const displayIVal = document.getElementById('display-i-val');
        const displayCount = document.getElementById('display-count');
        const displayMaxCount = document.getElementById('display-max-count');
        const displayMode = document.getElementById('display-mode');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        function generateRandomArray() {
            // Generamos pocos números para que sea probable encontrar repeticiones
            const size = 8;
            numbers = Array.from({ length: size }, () => Math.floor(Math.random() * 5) + 1);
        }

        function initArrayUI() {
            arrayContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const div = document.createElement('div');
                div.id = `box-${index}`;
                div.className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-white border-2 border-slate-300 rounded-lg text-xl font-bold shadow-sm transition-all duration-300';
                div.innerText = num;
                arrayContainer.appendChild(div);
            });
        }

        function resetSimulation() {
            generateRandomArray();
            i = 0;
            j = 0;
            count = 0;
            maxCount = 0;
            moda = "-";
            state = 'INIT_I';
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.innerText = "Siguiente Paso";
            
            displayIVal.innerText = "-";
            displayCount.innerText = "0";
            displayMaxCount.innerText = "0";
            displayMode.innerText = "-";
            stepDesc.innerText = "Buscando la moda mediante comparaciones anidadas.";
            initArrayUI();
        }

        function nextStep() {
            if (isFinished) return;

            const n = numbers.length;

            if (state === 'INIT_I') {
                if (i < n - 1) {
                    count = 1;
                    j = i + 1;
                    state = 'LOOP_J';
                    stepDesc.innerText = `Fijamos x(${i+1})=${numbers[i]} y empezamos a contar sus repeticiones.`;
                    render();
                } else {
                    state = 'FINISHED';
                    nextStep();
                }
            } else if (state === 'LOOP_J') {
                if (j < n) {
                    if (numbers[i] === numbers[j]) {
                        count++;
                        stepDesc.innerText = `¡Coincidencia! Encontrado x(${j+1})=${numbers[j]}. Contador = ${count}.`;
                        document.getElementById(`box-${j}`).classList.add('match-found');
                    } else {
                        stepDesc.innerText = `x(${j+1})=${numbers[j]} no es igual a ${numbers[i]}.`;
                    }
                    render();
                    j++;
                } else {
                    state = 'CHECK_MAX';
                    nextStep();
                }
            } else if (state === 'CHECK_MAX') {
                if (count > maxCount) {
                    maxCount = count;
                    moda = numbers[i];
                    stepDesc.innerText = `El valor ${numbers[i]} se repite ${count} veces. ¡Es el nuevo máximo de repeticiones!`;
                } else {
                    stepDesc.innerText = `El conteo para ${numbers[i]} (${count}) no supera al máximo actual (${maxCount}).`;
                }
                i++;
                state = 'INIT_I';
                render();
            } else if (state === 'FINISHED') {
                isFinished = true;
                nextBtn.disabled = true;
                nextBtn.innerText = "Finalizado";
                stepDesc.innerHTML = `<span class="text-indigo-600 font-bold text-lg">La moda es ${moda} con ${maxCount} repeticiones.</span>`;
                renderFinal();
            }
        }

        function render() {
            for (let k = 0; k < numbers.length; k++) {
                const box = document.getElementById(`box-${k}`);
                box.classList.remove('puntero-i', 'puntero-j');
                if (k === i) box.classList.add('puntero-i');
                if (state === 'LOOP_J' && k === j) box.classList.add('puntero-j');
                
                // Si este número es la moda actual conocida, resaltarlo ligeramente
                if (numbers[k] === moda && maxCount > 0) {
                    box.classList.add('mode-current');
                } else {
                    box.classList.remove('mode-current');
                }
            }
            displayIVal.innerText = numbers[i] || "-";
            displayCount.innerText = count;
            displayMaxCount.innerText = maxCount;
            displayMode.innerText = moda;
        }

        function renderFinal() {
            for (let k = 0; k < numbers.length; k++) {
                const box = document.getElementById(`box-${k}`);
                box.classList.remove('puntero-i', 'puntero-j', 'match-found');
                if (numbers[k] === moda) {
                    box.classList.add('mode-current');
                } else {
                    box.style.opacity = "0.5";
                }
            }
        }

        resetSimulation();
    </script>
</body>
</html>
