<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Inversión de Dígitos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    @font-face {
      font-family: 'Monocraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Monocraft@main/dist/Monocraft-ttf/Monocraft.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    body {
      font-family: 'Monocraft', monospace;
    }
        .active-digit {
            border: 4px solid #ef4444 !important;
            transform: scale(1.1);
            z-index: 10;
        }
        .vector-box {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .highlight-x { background-color: #450a0a; border-color: #991b1b; }
        .neon-border {
            box-shadow: 0 0 5px #fff, 0 0 10px #a855f7, inset 0 0 5px #a855f7;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-6xl p-4 flex justify-between items-center">
        <a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded transition duration-300 neon-border">Volver</a>
        <button id="toggle-pseudocode" class="lg:hidden border-2 border-purple-500 hover:bg-purple-500/20 text-purple-400 font-bold py-2 px-4 rounded transition duration-300 neon-border">
            Pseudocódigo
        </button>
    </div>

    <div class="layout-wrapper grid grid-cols-1 lg:grid-cols-12 gap-8 w-full max-w-6xl px-4">
        <!-- Columna Izquierda: Simulación -->
        <main class="lg:col-span-8 p-4">
            <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Inversión de Dígitos</h1>
            
            <div class="flex justify-center mb-8">
                <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 w-full max-w-xl">
                    <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 text-center">Dígitos Extraídos (x)</h2>
                    <div class="flex flex-wrap justify-center gap-2" id="container-x"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center bg-slate-950 p-6 rounded-xl mb-8 border border-slate-800">
                <div class="flex flex-col">
                    <span class="text-xs text-indigo-400 uppercase font-bold tracking-wider">Valor n</span>
                    <span id="display-n" class="text-3xl font-mono font-bold text-purple-300">-</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Índice i</span>
                    <span id="display-i" class="text-3xl font-mono font-semibold">-</span>
                </div>
                <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-700 pt-4 md:pt-0">
                    <span class="text-xs text-red-500 uppercase font-bold tracking-wider">dígito = mod(n,10)</span>
                    <span id="display-digit" class="text-3xl font-mono font-bold text-red-500">-</span>
                </div>
                <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-700 pt-4 md:pt-0">
                    <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Contador</span>
                    <span id="display-count" class="text-3xl font-mono font-bold text-emerald-400">-</span>
                </div>
            </div>

            <div class="flex flex-col items-center gap-6">
                <p id="step-desc" class="text-center italic text-slate-400 min-h-[3rem] px-4 max-w-2xl">
                    Ingresa un número para comenzar.
                </p>
                
                <div class="flex flex-wrap justify-center gap-4">
                    <input type="number" id="input-n" placeholder="Ej: 1234" class="px-4 py-2 bg-slate-900 text-slate-100 border-2 border-slate-700 rounded-lg focus:border-purple-500 outline-none w-32 text-center font-mono font-bold">
                    <button onclick="resetWithRandom()" class="px-6 py-2 border-2 border-slate-600 hover:bg-slate-600/20 text-slate-300 font-medium py-2 px-6 rounded transition duration-300">
                        Aleatorio
                    </button>
                    <button onclick="startSimulation()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-100 rounded-lg font-medium transition-colors">
                        Cargar
                    </button>
                    <button id="next-btn" onclick="nextStep()" class="px-8 py-2 border-2 border-purple-500 hover:bg-purple-500/20 text-purple-400 font-bold py-2 px-8 rounded transition duration-300 neon-border active:scale-95 disabled:opacity-50">
                        Siguiente Paso
                    </button>
                </div>
            </div>
        </main>

        <!-- Columna Derecha: Pseudocódigo -->
        <aside id="pseudocode-container" class="hidden lg:block lg:col-span-4 p-4">
            <h2 class="text-xl font-bold mb-4 text-emerald-400">Pseudocódigo</h2>
            <div class="overflow-x-auto">
                <pre class="text-sm font-mono text-emerald-500 leading-relaxed">
Input: n
i=1
while n>0
    x(i)=mod(n,10)
    n=(n-x(i))/10
    i=i+1
end
return x,i-1</pre>
            </div>
        </aside>
    </div>

    <script>
        let n = 0;
        let digits = [];
        let i = 0;
        let isFinished = false;

        const containerX = document.getElementById('container-x');
        const displayN = document.getElementById('display-n');
        const displayI = document.getElementById('display-i');
        const displayDigit = document.getElementById('display-digit');
        const displayCount = document.getElementById('display-count');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');
        const inputN = document.getElementById('input-n');
        const pseudocodeContainer = document.getElementById('pseudocode-container');
        const toggleBtn = document.getElementById('toggle-pseudocode');

        toggleBtn.addEventListener('click', () => {
            pseudocodeContainer.classList.toggle('hidden');
        });

        function resetWithRandom() {
            const randomVal = Math.floor(Math.random() * 8999) + 1000;
            inputN.value = randomVal;
            startSimulation();
        }

        function startSimulation() {
            const val = parseInt(inputN.value);
            if (isNaN(val) || val < 0) return;
            
            n = val;
            digits = [];
            i = 0;
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.innerText = "Siguiente Paso";
            
            containerX.innerHTML = '';
            displayN.innerText = n;
            displayI.innerText = 1;
            displayDigit.innerText = "-";
            displayCount.innerText = "-";
            stepDesc.innerText = "Extrayendo dígitos mediante módulo 10.";
        }

        function nextStep() {
            if (isFinished) return;

            if (n > 0) {
                let digit = n % 10;
                digits.push(digit);
                
                const box = document.createElement('div');
                box.className = 'w-10 h-10 flex items-center justify-center border-2 border-red-900 rounded highlight-x font-bold vector-box active-digit';
                box.innerText = digit;
                containerX.appendChild(box);
                
                stepDesc.innerText = `Extrayendo: ${digit}. n ahora es ${Math.floor(n / 10)}.`;
                
                n = Math.floor(n / 10);
                displayN.innerText = n;
                displayDigit.innerText = digit;
                displayCount.innerText = i + 1;
                i++;
            } else {
                isFinished = true;
                nextBtn.disabled = true;
                nextBtn.innerText = "Finalizado";
                stepDesc.innerHTML = `<span class="text-purple-400 font-bold">Inversión completada: [${digits.reverse().join(', ')}]</span>`;
                document.querySelectorAll('.active-digit').forEach(el => el.classList.remove('active-digit'));
            }
        }

        inputN.value = 1234;
        startSimulation();
    </script>
</body>
</html>
