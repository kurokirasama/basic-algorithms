<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Ordenación por Selección</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .puntero-i {
            border: 4px solid #3b82f6 !important; /* Azul para la posición i */
            transform: scale(1.05);
        }
        .puntero-j {
            border: 4px solid #ef4444 !important; /* Rojo para el índice j */
            transform: scale(1.1);
            z-index: 10;
        }
        .min-actual {
            background-color: #10b981 !important; /* Verde para el mínimo actual */
            color: white;
            border-color: #059669 !important;
        }
        .ordenado {
            background-color: #f1f5f9;
            color: #94a3b8;
            border-style: dashed;
        }
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-4xl p-4"><a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded mb-4 transition duration-300 neon-border">Volver</a></div>

    <main class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-xl border border-slate-800 p-8">
        <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Ordenación por Selección (Selection Sort)</h1>
        
        <div class="flex flex-wrap justify-center gap-3 mb-10" id="array-container"></div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center bg-slate-950 p-6 rounded-xl mb-8">
            <div class="flex flex-col">
                <span class="text-xs text-blue-600 uppercase font-bold tracking-wider">Posición (i)</span>
                <span id="display-i" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col">
                <span class="text-xs text-red-500 uppercase font-bold tracking-wider">Buscando (j)</span>
                <span id="display-j" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-800 pt-4 md:pt-0">
                <span class="text-xs text-emerald-400 uppercase font-bold tracking-wider">Índice Mínimo</span>
                <span id="display-min-idx" class="text-3xl font-mono font-semibold">-</span>
            </div>
            <div class="flex flex-col border-t md:border-t-0 md:border-l border-slate-200 pt-4 md:pt-0">
                <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Valor Mínimo</span>
                <span id="display-min-val" class="text-3xl font-mono font-bold text-slate-700">-</span>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6">
            <p id="step-desc" class="text-center italic text-slate-400 min-h-[3rem] px-4 max-w-2xl">
                Presiona "Siguiente Paso" para comenzar a ordenar el vector.
            </p>
            
            <div class="flex gap-4">
                <button onclick="resetSimulation()" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg font-medium transition-colors">
                    Reiniciar (Aleatorio)
                </button>
                <button id="next-btn" onclick="nextStep()" class="px-8 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold transition-all shadow-lg active:scale-95">
                    Siguiente Paso
                </button>
            </div>
        </div>
    </main>

    <script>
        let numbers = [];
        let i = 0;
        let j = 1;
        let min_i = 0;
        let state = 'START_I'; // START_I, SEARCH_J, SWAP
        let isFinished = false;

        const arrayContainer = document.getElementById('array-container');
        const displayI = document.getElementById('display-i');
        const displayJ = document.getElementById('display-j');
        const displayMinIdx = document.getElementById('display-min-idx');
        const displayMinVal = document.getElementById('display-min-val');
        const stepDesc = document.getElementById('step-desc');
        const nextBtn = document.getElementById('next-btn');

        function generateRandomArray() {
            const size = 7;
            numbers = Array.from({ length: size }, () => Math.floor(Math.random() * 98) + 1);
        }

        function initArrayUI() {
            arrayContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                const div = document.createElement('div');
                div.id = `box-${index}`;
                div.className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-slate-800 border-2 border-slate-700 text-slate-100 rounded-lg text-xl font-bold shadow-sm transition-all duration-500';
                div.innerText = num;
                arrayContainer.appendChild(div);
            });
        }

        function resetSimulation() {
            generateRandomArray();
            i = 0;
            j = 1;
            min_i = 0;
            state = 'START_I';
            isFinished = false;
            nextBtn.disabled = false;
            nextBtn.innerText = "Siguiente Paso";
            updateUI("-", "-", "-", "-");
            stepDesc.innerText = "Nuevo vector generado. Listo para ordenar.";
            initArrayUI();
        }

        function nextStep() {
            if (isFinished) return;

            const n = numbers.length;

            switch(state) {
                case 'START_I':
                    if (i < n - 1) {
                        min_i = i;
                        j = i + 1;
                        stepDesc.innerText = `Ciclo i=${i+1}: Buscamos el mínimo desde la posición ${i+1}. Asumimos que x(${i+1})=${numbers[i]} es el mínimo.`;
                        state = 'SEARCH_J';
                        render();
                    } else {
                        finish();
                    }
                    break;

                case 'SEARCH_J':
                    if (j < n) {
                        stepDesc.innerText = `Comparando el mínimo actual (${numbers[min_i]}) con x(${j+1})=${numbers[j]}.`;
                        if (numbers[j] < numbers[min_i]) {
                            min_i = j;
                            stepDesc.innerText += ` ¡Nuevo mínimo encontrado en la posición ${j+1}!`;
                        }
                        render();
                        j++;
                    } else {
                        state = 'SWAP';
                        stepDesc.innerText = `Fin de búsqueda. El mínimo de este ciclo es ${numbers[min_i]}.`;
                        render();
                    }
                    break;

                case 'SWAP':
                    stepDesc.innerText = `Intercambiamos x(${i+1})=${numbers[i]} con el mínimo x(${min_i+1})=${numbers[min_i]}.`;
                    let temp = numbers[i];
                    numbers[i] = numbers[min_i];
                    numbers[min_i] = temp;
                    
                    // Actualizar visualmente los textos de los cuadros antes de seguir
                    document.getElementById(`box-${i}`).innerText = numbers[i];
                    document.getElementById(`box-${min_i}`).innerText = numbers[min_i];
                    
                    i++;
                    state = 'START_I';
                    render();
                    break;
            }
        }

        function render() {
            for (let k = 0; k < numbers.length; k++) {
                const box = document.getElementById(`box-${k}`);
                box.classList.remove('puntero-i', 'puntero-j', 'min-actual', 'ordenado');
                
                if (k < i) box.classList.add('ordenado');
                if (k === i && state !== 'SWAP') box.classList.add('puntero-i');
                if (state === 'SEARCH_J' && k === j) box.classList.add('puntero-j');
                if (k === min_i) box.classList.add('min-actual');
            }
            updateUI(i + 1, state === 'SEARCH_J' ? j + 1 : "-", min_i + 1, numbers[min_i]);
        }

        function updateUI(idxI, idxJ, mIdx, mVal) {
            displayI.innerText = idxI;
            displayJ.innerText = idxJ;
            displayMinIdx.innerText = mIdx;
            displayMinVal.innerText = mVal;
        }

        function finish() {
            isFinished = true;
            nextBtn.disabled = true;
            nextBtn.innerText = "Ordenado";
            stepDesc.innerHTML = `<span class="text-indigo-400 font-bold text-lg">El vector ha sido ordenado completamente.</span>`;
            for (let k = 0; k < numbers.length; k++) {
                document.getElementById(`box-${k}`).className = 'w-14 h-14 md:w-16 md:h-16 flex items-center justify-center bg-emerald-50 border-2 border-emerald-500 rounded-lg text-xl font-bold text-emerald-700 shadow-sm';
            }
        }

        resetSimulation();
    </script>
</body>
</html>
