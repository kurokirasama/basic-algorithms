<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Matriz Tridiagonal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    @font-face {
      font-family: 'Monocraft';
      src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Monocraft@main/dist/Monocraft-ttf/Monocraft.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    body {
      font-family: 'Monocraft', monospace;
    }
        .neon-border {
            box-shadow: 0 0 5px #fff, 0 0 10px #a855f7, inset 0 0 5px #a855f7;
        }
        .matrix-cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
            font-weight: bold;
        }
        .active-cell {
            border: 4px solid #ef4444 !important;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-6xl p-4 flex justify-between items-center">
        <a href="../../index.html" class="inline-block border-2 border-red-500 hover:bg-red-500/20 text-red-400 font-bold py-2 px-4 rounded transition duration-300 neon-border">Volver</a>
        <button id="toggle-pseudocode" class="lg:hidden border-2 border-purple-500 hover:bg-purple-500/20 text-purple-400 font-bold py-2 px-4 rounded transition duration-300 neon-border">
            Pseudocódigo
        </button>
    </div>

    <div class="layout-wrapper grid grid-cols-1 lg:grid-cols-12 gap-8 w-full max-w-6xl px-4">
        <!-- Columna Izquierda: Simulación -->
        <main class="lg:col-span-8 p-4">
            <h1 class="text-2xl font-bold text-center mb-8 text-purple-400">Simulación: Matriz Tridiagonal</h1>
            
            <div class="flex flex-col items-center gap-6 mb-8">
                <div class="grid grid-cols-4 gap-4 bg-slate-950 p-6 rounded-xl border border-slate-800 w-full max-w-md">
                    <div class="flex flex-col items-center"><label class="text-xs text-slate-400 mb-1">a</label><input type="number" id="input-a" value="2" class="bg-slate-900 text-slate-100 border-2 border-slate-700 rounded p-2 text-center w-full"></div>
                    <div class="flex flex-col items-center"><label class="text-xs text-slate-400 mb-1">b</label><input type="number" id="input-b" value="1" class="bg-slate-900 text-slate-100 border-2 border-slate-700 rounded p-2 text-center w-full"></div>
                    <div class="flex flex-col items-center"><label class="text-xs text-slate-400 mb-1">c</label><input type="number" id="input-c" value="3" class="bg-slate-900 text-slate-100 border-2 border-slate-700 rounded p-2 text-center w-full"></div>
                    <div class="flex flex-col items-center"><label class="text-xs text-slate-400 mb-1">n</label><input type="number" id="input-n" value="3" class="bg-slate-900 text-slate-100 border-2 border-slate-700 rounded p-2 text-center w-full"></div>
                </div>
                <div class="flex gap-4">
                    <button onclick="randomize()" class="border-2 border-slate-600 hover:bg-slate-600/20 text-slate-300 font-medium py-2 px-6 rounded transition duration-300">Aleatorio</button>
                    <button onclick="resetSimulation()" class="border-2 border-purple-500 hover:bg-purple-500/20 text-purple-400 font-bold py-2 px-8 rounded transition duration-300 neon-border">Generar/Reiniciar</button>
                    <button id="next-btn" onclick="nextStep()" class="border-2 border-purple-500 hover:bg-purple-500/20 text-purple-400 font-bold py-2 px-8 rounded transition duration-300 neon-border active:scale-95 disabled:opacity-50">Siguiente Paso</button>
                </div>
            </div>

            <div class="flex justify-center" id="matrix-container"></div>
            <p id="step-desc" class="text-center italic text-slate-400 mt-6 px-4">Presiona "Siguiente Paso" para comenzar.</p>
        </main>

        <!-- Columna Derecha: Pseudocódigo -->
        <aside id="pseudocode-container" class="hidden lg:block lg:col-span-4 p-4">
            <h2 class="text-xl font-bold mb-4 text-emerald-400">Pseudocódigo</h2>
            <div class="overflow-x-auto">
                <pre class="text-sm font-mono text-emerald-500 leading-relaxed">
Input: a,b,c,n
for i=1,...,n
    for j=1,...,n
        A(i,j)=0
    end
end
for i=1,...,n
    A(i,i)=a
end
for i=1,...,n-1
    A(i,i+1)=b
end
for i=2,...,n
    A(i,i-1)=c
end
return A</pre>
            </div>
        </aside>
    </div>

    <script>
        let a, b, c, n, A, r, col, step;
        const container = document.getElementById('matrix-container');
        const pseudocodeContainer = document.getElementById('pseudocode-container');
        const toggleBtn = document.getElementById('toggle-pseudocode');

        toggleBtn.addEventListener('click', () => {
            pseudocodeContainer.classList.toggle('hidden');
        });


        function randomize() {
            document.getElementById('input-a').value = Math.floor(Math.random() * 10) + 1;
            document.getElementById('input-b').value = Math.floor(Math.random() * 10) + 1;
            document.getElementById('input-c').value = Math.floor(Math.random() * 10) + 1;
            document.getElementById('input-n').value = Math.floor(Math.random() * 3) + 3;
            resetSimulation();
        }

        function resetSimulation() {
            a = parseInt(document.getElementById('input-a').value);
            b = parseInt(document.getElementById('input-b').value);
            c = parseInt(document.getElementById('input-c').value);
            n = parseInt(document.getElementById('input-n').value);
            
            A = Array.from({ length: n }, () => Array(n).fill(0));
            r = 0; col = 0;
            step = 'FILL_DIAG'; // FILL_DIAG, FILL_UPPER, FILL_LOWER, FINISHED
            
            document.getElementById('next-btn').disabled = false;
            document.getElementById('step-desc').innerText = "Iniciamos llenando la diagonal con 'a'.";
            render();
        }

        function render() {
            container.innerHTML = '';
            const table = document.createElement('div');
            table.style.display = 'grid';
            table.style.gridTemplateColumns = `repeat(${n}, 50px)`;
            table.style.gap = '2px';
            
            for (let row = 0; row < n; row++) {
                for (let c_idx = 0; c_idx < n; c_idx++) {
                    const cell = document.createElement('div');
                    cell.className = 'matrix-cell';
                    if (row === r && c_idx === col) cell.classList.add('active-cell');
                    cell.innerText = A[row][c_idx];
                    table.appendChild(cell);
                }
            }
            container.appendChild(table);
        }

        function nextStep() {
            if (step === 'FILL_DIAG') {
                r = i; col = i;
                A[i][i] = a;
                document.getElementById('step-desc').innerText = `A(${i+1},${i+1}) = a = ${a}`;
                i++;
                if (i === n) { i = 0; step = 'FILL_UPPER'; document.getElementById('step-desc').innerText = "Diagonal llena. Llenando diagonal superior con 'b'."; }
                render();
            } else if (step === 'FILL_UPPER') {
                if (i < n - 1) {
                    r = i; col = i+1;
                    A[i][i+1] = b;
                    document.getElementById('step-desc').innerText = `A(${i+1},${i+2}) = b = ${b}`;
                    i++;
                    render();
                } else {
                    i = 1; step = 'FILL_LOWER'; document.getElementById('step-desc').innerText = "Diagonal superior llena. Llenando diagonal inferior con 'c'.";
                }
            } else if (step === 'FILL_LOWER') {
                if (i < n) {
                    r = i; col = i-1;
                    A[i][i-1] = c;
                    document.getElementById('step-desc').innerText = `A(${i+1},${i}) = c = ${c}`;
                    i++;
                    render();
                } else {
                    step = 'FINISHED';
                    r = -1; col = -1;
                    document.getElementById('step-desc').innerText = "Matriz completa.";
                    document.getElementById('next-btn').disabled = true;
                    render();
                }
            }
        }
        let i = 0;
        resetSimulation();
    </script>
</body>
</html>
